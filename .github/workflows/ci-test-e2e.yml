name: Tests E2E

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      deno-version:
        required: true
        type: string
      lowercase-repo:
        required: true
        type: string
      gh-docker-tag:
        required: true
        type: string
      enterprise-license:
        type: string
      transporter:
        type: string
      mongodb-version:
        default: "['8.0']"
        required: false
        type: string
      release:
        required: true
        type: string
      shard:
        default: '[1]'
        required: false
        type: string
      total-shard:
        default: 1
        required: false
        type: number
      retries:
        default: 0
        required: false
        type: number
      type:
        required: true
        type: string
      coverage:
        required: false
        type: string
    secrets:
      CR_USER:
        required: true
      CR_PAT:
        required: true
      TEMP_DOCKERHUB_FIPS_USER:
        required: false
      TEMP_DOCKERHUB_FIPS_PASS:
        required: false
      QASE_API_TOKEN:
        required: false
      REPORTER_ROCKETCHAT_URL:
        required: false
      REPORTER_ROCKETCHAT_API_KEY:
        required: false
      CODECOV_TOKEN:
        required: false
      REPORTER_JIRA_ROCKETCHAT_API_KEY:
        required: false

env:
  MONGO_URL: mongodb://localhost:27017/rocketchat?replicaSet=rs0&directConnection=true
  TOOL_NODE_FLAGS: ${{ vars.TOOL_NODE_FLAGS }}
  LOWERCASE_REPOSITORY: ${{ inputs.lowercase-repo }}
  DOCKER_TAG: ${{ inputs.gh-docker-tag }}-amd64

jobs:
  test:
    runs-on: ubuntu-24.04

    env:
      # if building for production on develop branch or release, add suffix for coverage images
      DOCKER_TAG_SUFFIX_ROCKETCHAT: ${{ inputs.coverage == matrix.mongodb-version && (github.event_name == 'release' || github.ref == 'refs/heads/develop') && '-cov' || '' }}
      MONGODB_VERSION: ${{ matrix.mongodb-version }}
      COVERAGE_DIR: '/tmp/coverage/${{ startsWith(inputs.type, ''api'') && ''api'' || inputs.type }}'
      COVERAGE_FILE_NAME: '${{ inputs.type }}-${{ matrix.shard }}.json'
      COVERAGE_REPORTER: ${{ inputs.coverage == matrix.mongodb-version && 'json' || '' }}

    strategy:
      fail-fast: false
      matrix:
        mongodb-version: ${{ fromJSON(inputs.mongodb-version) }}
        shard: ${{ fromJSON(inputs.shard) }}

    name: MongoDB ${{ matrix.mongodb-version }}${{ inputs.coverage == matrix.mongodb-version && ' coverage' || '' }} (${{ matrix.shard }}/${{ inputs.total-shard }})

    steps:
      - name: Set compose files
        run: |
          if [[ '${{ inputs.release }}' == 'fips' ]]; then
            echo 'COMPOSE_FILES=-f docker-compose-ci.yml -f docker-compose-ci.fips.yml' >> $GITHUB_ENV
            echo 'COMPOSE_FILES_METEOR=-f ../../docker-compose-ci.yml -f ../../docker-compose-ci.fips.yml' >> $GITHUB_ENV
          else
            echo 'COMPOSE_FILES=-f docker-compose-ci.yml' >> $GITHUB_ENV
            echo 'COMPOSE_FILES_METEOR=-f ../../docker-compose-ci.yml' >> $GITHUB_ENV
          fi

      - name: Collect Workflow Telemetry
        if: inputs.type == 'perf'
        uses: catchpoint/workflow-telemetry-action@v2
        with:
          theme: dark
          job_summary: true
          comment_on_pr: false

      - name: Setup kernel limits
        run: |
          echo "500 65535" > sudo tee -a /proc/sys/net/ipv4/ip_local_port_range
          sudo sysctl -w net.ipv4.tcp_mem="383865   511820   2303190"

          echo fs.file-max=20000500 | sudo tee -a /etc/sysctl.conf
          echo fs.nr_open=20000500 | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p

      - name: Login to GitHub Container Registry
        if: (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'release' || github.ref == 'refs/heads/develop') && github.actor != 'dependabot[bot]'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.CR_USER }}
          password: ${{ secrets.CR_PAT }}

      - name: Login to DockerHub for FIPS base images
        if: inputs.release == 'fips' && env.TEMP_DOCKERHUB_FIPS_USER != '' && env.TEMP_DOCKERHUB_FIPS_PASS != ''
        uses: docker/login-action@v3
        env:
          TEMP_DOCKERHUB_FIPS_USER: ${{ secrets.TEMP_DOCKERHUB_FIPS_USER }}
          TEMP_DOCKERHUB_FIPS_PASS: ${{ secrets.TEMP_DOCKERHUB_FIPS_PASS }}
        with:
          username: ${{ secrets.TEMP_DOCKERHUB_FIPS_USER }}
          password: ${{ secrets.TEMP_DOCKERHUB_FIPS_PASS }}

      - uses: actions/checkout@v6

      - name: Setup NodeJS
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}
          deno-version: ${{ inputs.deno-version }}
          cache-modules: true
          install: true
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: rharkor/caching-for-turbo@v1.8

      - name: Restore packages build
        uses: actions/download-artifact@v8
        with:
          name: packages-build
          path: /tmp

      - name: Unpack packages build
        shell: bash
        run: |
          tar -xzf /tmp/RocketChat-packages-build.tar.gz -C .

      # Download Docker images from build artifacts
      - name: Download Docker images
        uses: actions/download-artifact@v8
        if: github.event.pull_request.head.repo.full_name != github.repository && github.event_name != 'release' && github.ref != 'refs/heads/develop'
        with:
          pattern: ${{ inputs.release == 'ce' && 'docker-image-rocketchat-amd64-coverage' || (inputs.release == 'fips' && 'docker-image-*-amd64-fips' || 'docker-image-*-amd64-coverage') }}
          path: /tmp/docker-images
          merge-multiple: true

      # Load Docker images
      - name: Load Docker images
        if: github.event.pull_request.head.repo.full_name != github.repository && github.event_name != 'release' && github.ref != 'refs/heads/develop'
        shell: bash
        run: |
          set -o xtrace

          # Load all downloaded images
          for image_file in /tmp/docker-images/*.tar; do
            if [ -f "$image_file" ]; then
              echo "Loading image from $image_file"
              docker load -i "$image_file"
              rm "$image_file"
            fi
          done

          # List loaded images
          docker images

      - name: Set DEBUG_LOG_LEVEL (debug enabled)
        if: runner.debug == '1'
        run: echo "DEBUG_LOG_LEVEL=2" >> $GITHUB_ENV

      - name: Start httpbin container and wait for it to be ready
        if: inputs.type == 'api' || inputs.type == 'api-livechat'
        run: |
          docker compose $COMPOSE_FILES up -d httpbin

      - name: Prepare code coverage directory
        run: |
          set -o xtrace

          mkdir -p $COVERAGE_DIR
          chmod 777 $COVERAGE_DIR

      - name: Pull FIPS images
        if: inputs.release == 'fips' && (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'release' || github.ref == 'refs/heads/develop')
        run: |
          docker compose $COMPOSE_FILES pull

      - name: Start containers for CE
        if: inputs.release == 'ce'
        run: |
          # when we are testing CE, we only need to start the rocketchat container
          DEBUG_LOG_LEVEL=${DEBUG_LOG_LEVEL:-0} docker compose $COMPOSE_FILES up -d rocketchat --wait

      - name: Start containers for EE
        if: inputs.release == 'ee' || inputs.release == 'fips'
        env:
          ENTERPRISE_LICENSE: ${{ inputs.enterprise-license }}
          TRANSPORTER: ${{ inputs.transporter }}
        run: |
          if [[ '${{ inputs.release }}' == 'fips' ]]; then
            DEBUG_LOG_LEVEL=${DEBUG_LOG_LEVEL:-0} docker compose $COMPOSE_FILES up -d --wait --no-build
          else
            DEBUG_LOG_LEVEL=${DEBUG_LOG_LEVEL:-0} docker compose $COMPOSE_FILES up -d --wait
          fi

      - uses: ./.github/actions/setup-playwright
        if: inputs.type == 'ui'

      - name: Wait services to start up
        if: inputs.release == 'ee' || inputs.release == 'fips'
        run: |
          docker ps

          wait_for_service() {
            local service="$1"
            local retries=18
            local delay=10

            for attempt in $(seq 1 "$retries"); do
              if docker compose $COMPOSE_FILES logs "$service" | grep -q "NetworkBroker started successfully"; then
                echo "Service '$service' is ready"
                return 0
              fi

              echo "Waiting '$service' to start up (attempt ${attempt}/${retries})"
              sleep "$delay"
            done

            echo "Service '$service' did not become ready in time"
            docker compose $COMPOSE_FILES logs "$service"
            return 1
          }

          wait_for_service ddp-streamer-service
          wait_for_service account-service
          wait_for_service authorization-service
          wait_for_service queue-worker-service
          wait_for_service presence-service

      - name: Remove unused Docker images
        run: docker system prune -af

      - name: E2E Test API
        if: inputs.type == 'api'
        working-directory: ./apps/meteor
        env:
          WEBHOOK_TEST_URL: 'http://httpbin'
          IS_EE: ${{ (inputs.release == 'ee' || inputs.release == 'fips') && 'true' || '' }}
        run: |
          set -o xtrace

          npm run testapi

          docker compose $COMPOSE_FILES_METEOR stop

          ls -la $COVERAGE_DIR
          exit $s

      - name: E2E Test API (Livechat)
        if: inputs.type == 'api-livechat'
        working-directory: ./apps/meteor
        env:
          WEBHOOK_TEST_URL: 'http://httpbin'
          IS_EE: ${{ (inputs.release == 'ee' || inputs.release == 'fips') && 'true' || '' }}
        run: |
          set -o xtrace

          npm run testapi:livechat

          docker compose $COMPOSE_FILES_METEOR stop

          ls -la $COVERAGE_DIR
          exit $s

      - name: E2E Test UI (${{ matrix.shard }}/${{ inputs.total-shard }})
        if: inputs.type == 'ui'
        env:
          E2E_COVERAGE: ${{ inputs.coverage == matrix.mongodb-version && 'true' || '' }}
          IS_EE: ${{ (inputs.release == 'ee' || inputs.release == 'fips') && 'true' || '' }}
          REPORTER_ROCKETCHAT_API_KEY: ${{ secrets.REPORTER_ROCKETCHAT_API_KEY }}
          REPORTER_ROCKETCHAT_URL: ${{ secrets.REPORTER_ROCKETCHAT_URL }}
          REPORTER_JIRA_ROCKETCHAT_API_KEY: ${{ secrets.REPORTER_JIRA_ROCKETCHAT_API_KEY }}
          REPORTER_ROCKETCHAT_REPORT: ${{ github.event.pull_request.draft != 'true' && secrets.REPORTER_ROCKETCHAT_URL != '' && 'true' || '' }}
          REPORTER_ROCKETCHAT_RUN: ${{ github.run_number }}
          REPORTER_ROCKETCHAT_BRANCH: ${{ github.ref }}
          REPORTER_ROCKETCHAT_DRAFT: ${{ github.event.pull_request.draft }}
          REPORTER_ROCKETCHAT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPORTER_ROCKETCHAT_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPORTER_ROCKETCHAT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORTER_ROCKETCHAT_PR: ${{ github.event.pull_request.number }}
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_REPORT: ${{ github.ref == 'refs/heads/develop' && 'true' || '' }}
          CI: true
          PLAYWRIGHT_RETRIES: ${{ inputs.retries }}
        working-directory: ./apps/meteor
        run: |
          set -o xtrace

          yarn prepare
          yarn test:e2e --shard=${{ matrix.shard }}/${{ inputs.total-shard }}

      - name: Merge ui coverage files
        if: inputs.type == 'ui' && inputs.coverage == matrix.mongodb-version
        working-directory: ./apps/meteor
        run: |
          npx nyc merge .nyc_output ${COVERAGE_DIR}/${COVERAGE_FILE_NAME}
          ls -la $COVERAGE_DIR || true

      - name: Store playwright test trace
        if: inputs.type == 'ui' && always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-trace-${{ inputs.release }}-${{ matrix.mongodb-version }}-${{ matrix.shard }}
          path: ./apps/meteor/tests/e2e/.playwright*
          include-hidden-files: true

      - name: Show server logs if E2E test failed
        if: failure()
        run: docker compose $COMPOSE_FILES logs rocketchat authorization-service queue-worker-service ddp-streamer-service account-service presence-service omnichannel-transcript-service

      - name: Show mongo logs if E2E test failed
        if: failure()
        run: docker compose $COMPOSE_FILES logs mongo

      - name: Store coverage
        if: inputs.coverage == matrix.mongodb-version
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ inputs.type }}-${{ matrix.shard }}
          path: /tmp/coverage
          include-hidden-files: true

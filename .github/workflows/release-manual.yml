name: Release (manual or scheduled)

on:
  workflow_call:
    inputs:
      action:
        description: "Release action: next, patch, or cut"
        required: true
        type: string
      base-ref:
        description: "Base ref to use for the release"
        required: false
        type: string
        default: develop
    secrets:
      CI_PAT:
        required: true
      NPM_TOKEN:
        required: true

env:
  HUSKY: 0

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base-ref }}
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - name: Setup NodeJS
        uses: ./.github/actions/setup-node
        with:
          node-version: 22.16.0
          deno-version: 1.43.5
          cache-modules: true
          install: true
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: rharkor/caching-for-turbo@v1.8

      - name: 'Start release: ${{ inputs.action }}'
        uses: ./packages/release-action
        with:
          action: ${{ inputs.action }}
          base-ref: ${{ inputs.base-ref }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.CI_PAT }}

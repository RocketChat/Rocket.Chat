server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Add CORS headers for static assets (fonts, etc.)
    location ~* \.(woff2?|ttf|otf|eot)$ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files $uri =404;
    }

    # 1. Serve Static Assets
    # Serve files if they exist
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Strict Backend Proxies (API, Websockets, Uploads)
    # These must be handled by the Rocket.Chat Meteor server
    location ~ ^/(api|sockjs|websocket|assets|avatar|file-upload|emoji-custom|custom-sounds|layout|i18n|packages) {
        proxy_pass http://rocketchat:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Hybrid Paths (Images)
    # Try serving from dist first (e.g., manifest/logo), fall back to backend
    location /images {
        try_files $uri @backend_fallback;
    }

    location @backend_fallback {
        proxy_pass http://rocketchat:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

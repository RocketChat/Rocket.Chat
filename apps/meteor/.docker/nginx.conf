server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Strict Backend Proxies (API, WebSockets, Assets, etc.)
    # These must be handled by the Rocket.Chat Meteor server
    location ~ ^/(api|sockjs|websocket|_saml|assets|avatar|file-upload|emoji-custom|custom-sounds|layout|i18n|packages|meteor_runtime_config\.js) {
        proxy_pass http://rocketchat:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Hybrid Paths (Images)
    location /images {
        try_files $uri @backend_fallback;
    }

    location @backend_fallback {
        proxy_pass http://rocketchat:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Frontend / SPA Catch-all
    # The /saml/... route will now hit this, serving index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
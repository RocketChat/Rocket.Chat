server {
    listen 80;
    server_name localhost;

    # 1. Force UTF-8
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # 2. Security & CORS for Fonts
    # The 'always' parameter ensures headers are sent even on 404s
    location ~* \.(woff2?|ttf|otf|eot)$ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Expose-Headers "*" always;
        try_files $uri =404;
    }

    # 3. Standard Asset Caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 4. Backend Proxies
    location ~ ^/(api|sockjs|websocket|_saml|assets|avatar|file-upload|emoji-custom|custom-sounds|layout|i18n|packages|meteor_runtime_config\.js) {
        proxy_pass http://rocketchat:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. Hybrid Paths (Images)
    # Try serving from Nginx first, fallback to Meteor
    location /images {
        try_files $uri @backend_fallback;
    }

    location @backend_fallback {
        proxy_pass http://rocketchat:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    # 6. SPA Catch-all
    # Handles /saml, /home, /admin, and any client-side route
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}